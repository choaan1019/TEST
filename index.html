<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TEST | Codex Workflow Check</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1b1f24;
        --muted: #5f6b76;
        --line: #d7dde3;
        --panel: #ffffff;
        --page: #f4f6f8;
        --accent: #0f766e;
        --accent-soft: #d9f3ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--page);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 32px;
        padding: 6px 12px;
        border: 1px solid #9ed8cf;
        border-radius: 999px;
        background: var(--accent-soft);
        color: #0b4f49;
        font-size: 14px;
        font-weight: 650;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }

      h1 {
        margin: 20px 0 10px;
        font-size: clamp(36px, 7vw, 72px);
        line-height: 1;
        letter-spacing: 0;
      }

      .summary {
        max-width: 680px;
        margin: 0 0 32px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .item {
        min-height: 142px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .label {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .value {
        margin: 0;
        font-size: 20px;
        font-weight: 720;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 24px, 920px);
          padding: 36px 0;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .summary {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="status">GitHub Pages 測試頁</div>
      <h1>TEST</h1>
      <p class="summary">
        這個最小 HTML 工具用來確認 Codex workflow、GitHub repo 與 GitHub Pages 是否已正確串接。
      </p>

      <section class="grid" aria-label="專案狀態">
        <article class="item">
          <p class="label">專案用途</p>
          <p class="value">測試用</p>
        </article>
        <article class="item">
          <p class="label">部署狀態</p>
          <p class="value">Pages 根目錄載入確認</p>
        </article>
        <article class="item">
          <p class="label">Firebase</p>
          <p class="value">沿用 2026database</p>
        </article>
      </section>

      <footer>
        更新日期：2026-05-29
      </footer>
    </main>
  </body>
</html>
